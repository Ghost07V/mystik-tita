name: Build privacy-os ISO

on:
  workflow_dispatch:

defaults:
  run:
    working-directory: privacy-os

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Free up disk space
        run: |
          echo "Before cleanup:"
          df -h /
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /opt/hostedtoolcache/CodeQL
          sudo docker image prune --all --force || true
          echo "After cleanup:"
          df -h /

      - name: Ensure build scripts are executable
        run: |
          chmod +x auto/config auto/build auto/clean
          chmod +x config/hooks/live/*.hook.chroot
          chmod +x config/includes.chroot/usr/local/sbin/mode-init

      - name: Install live-build
        run: |
          sudo apt-get update
          sudo apt-get install -y live-build

      - name: Build ISO
        run: |
          sudo lb clean
          sudo lb config
          sudo lb build

      - name: Show output size
        run: |
          ls -lh *.iso || true
          df -h /

      - name: Upload ISO as artifact
        uses: actions/upload-artifact@v4
        with:
          name: privacy-os-iso
          path: privacy-os/*.iso
          retention-days: 5
          if-no-files-found: error
